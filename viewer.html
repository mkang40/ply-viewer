<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PLY Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      font-family: Arial;
      font-size: 14px;
      color: #333;
      z-index: 1;
    }
  </style>
</head>
<body>

<div id="info">Drag to rotate | Scroll to zoom | Right-click to pan</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/PLYLoader.js"></script>

<script>
  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf0f0f0);

  // Camera
  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.set(0, 0, 2);

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Controls (rotate/zoom/pan)
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // Lighting
  const light1 = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
  scene.add(light1);

  const light2 = new THREE.DirectionalLight(0xffffff, 0.8);
  light2.position.set(1, 1, 1);
  scene.add(light2);

  // Load PLY
  const loader = new THREE.PLYLoader();
  loader.load('Jellycat.ply', function (geometry) {
    geometry.computeVertexNormals();

    const material = new THREE.MeshStandardMaterial({
      color: 0x6699ff,
      flatShading: false
    });

    const mesh = new THREE.Mesh(geometry, material);

    // Center and scale model
    geometry.center();
    mesh.scale.set(0.01, 0.01, 0.01); // adjust if needed

    scene.add(mesh);
  },
  function (xhr) {
    console.log((xhr.loaded / xhr.total * 100) + '% loaded');
  },
  function (error) {
    console.error('Error loading PLY:', error);
  });

  // Animate
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // Resize handling
  window.addEventListener('resize', function () {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
